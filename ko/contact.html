<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soulmate AI • 聯絡我們</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0a0a1f 0%, #1e1b4b 50%, #312e81 100%);
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
    }
    
    .neon-pink { text-shadow: 0 0 10px #ff79c6, 0 0 20px #ff79c6, 0 0 40px #c026d3; }
    .neon-cyan { text-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee; }
    
    .card {
      background: rgba(30, 27, 75, 0.85);
      border: 2px solid #ff79c6;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      transform: translateY(-8px);
      border-color: #22d3ee;
    }
    
    .glow-btn {
      background: linear-gradient(90deg, #ff79c6, #c026d3, #22d3ee);
      transition: all 0.3s ease;
    }
    .glow-btn:hover {
      transform: scale(1.05);
    }
    
    textarea, input {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255,255,255,0.2);
    }
    textarea:focus, input:focus {
      border-color: #ff79c6;
      outline: none;
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Navbar -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-black/70 backdrop-blur-md border-b border-pink-500/30">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <span class="text-3xl">💕</span>
        <h1 class="text-2xl font-bold neon-pink">Soulmate AI</h1>
      </div>
      <div class="flex gap-8 text-lg font-medium">
        <a href="index.html" class="hover:text-pink-400 transition-colors">首頁</a>
        <a href="chat.html" class="hover:text-pink-400 transition-colors">即時練習</a>
        <a href="phrases.html" class="hover:text-pink-400 transition-colors">常用句子</a>
        <a href="resource.html" class="hover:text-cyan-400 transition-colors">學習資源</a>
        <a href="stat.html" class="hover:text-cyan-400 transition-colors">統計數據</a>
        <a href="about.html" class="hover:text-cyan-400 transition-colors">關於我們</a>
        <a href="contact.html" class="hover:text-pink-400 transition-colors">聯絡</a>
      </div>
<a href="chat.html"
         class="glow-btn text-white text-sm font-bold px-6 py-2.5 rounded-2xl inline-flex items-center gap-2">
        <i class="fas fa-play"></i> 立即練習
      </a>
    </div>
  </nav>

  <div class="pt-24 pb-20 px-6 max-w-4xl mx-auto">
    <div class="text-center mb-16">
      <h1 class="text-6xl font-bold neon-pink mb-4">聯絡我們</h1>
      <p class="text-2xl text-cyan-300">有任何意見、建議或合作想法，歡迎告訴我們 💕</p>
    </div>

    <div class="card p-12 rounded-3xl">
      <form id="contactForm" onsubmit="handleSubmit(event)" class="space-y-8">
        
        <div>
          <label class="block text-sm text-slate-400 mb-2">你的名字</label>
          <input type="text" id="name" required
                 class="w-full px-6 py-5 rounded-2xl text-lg" placeholder="例如：陳小明">
        </div>

        <div>
          <label class="block text-sm text-slate-400 mb-2">電子郵件</label>
          <input type="email" id="email" required
                 class="w-full px-6 py-5 rounded-2xl text-lg" placeholder="your@email.com">
        </div>

        <div>
          <label class="block text-sm text-slate-400 mb-2">主題</label>
          <select id="subject" class="w-full px-6 py-5 rounded-2xl text-lg">
            <option value="">請選擇主題</option>
            <option value="feedback">網站回饋 / 使用意見</option>
            <option value="bug">發現錯誤</option>
            <option value="collaboration">合作詢問（學校、活動、推廣）</option>
            <option value="other">其他</option>
          </select>
        </div>

        <div>
          <label class="block text-sm text-slate-400 mb-2">你的訊息</label>
          <textarea id="message" rows="7" required
                    class="w-full px-6 py-5 rounded-2xl text-lg resize-y" 
                    placeholder="請告訴我們你的想法..."></textarea>
        </div>

        <button type="submit"
                class="glow-btn w-full py-7 text-xl font-bold rounded-3xl flex items-center justify-center gap-3">
          <i class="fas fa-paper-plane"></i>
          送出訊息
        </button>
      </form>
    </div>

    <!-- Thank you message (hidden by default) -->
    <div id="thankYou" class="hidden text-center mt-12">
      <div class="text-7xl mb-6">💕</div>
      <h2 class="text-4xl font-bold neon-pink mb-4">感謝你的訊息！</h2>
      <p class="text-xl text-slate-300">我們會盡快回覆你。</p>
    </div>

    <!-- Alternative contact -->
    <div class="mt-20 text-center text-slate-400">
      <p>或直接電郵我們：</p>
      <a href="mailto:soulmateai.hk@gmail.com" class="text-cyan-400 hover:text-pink-400 text-lg">
        soulmateai.hk@gmail.com
      </a>
    </div>
  </div>

  <footer class="bg-black py-12 text-center text-slate-500">
    <p>Soulmate AI • 聯絡我們</p>
    <p class="mt-1">Louie Hei Laam (Chloe) • HKCT Innovation Project 2026</p>
  </footer>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      
      // Simple demo submission
      document.getElementById('contactForm').classList.add('hidden');
      document.getElementById('thankYou').classList.remove('hidden');
      
      // Reset form after 3 seconds (for demo)
      setTimeout(() => {
        document.getElementById('contactForm').reset();
        document.getElementById('contactForm').classList.remove('hidden');
        document.getElementById('thankYou').classList.add('hidden');
      }, 3000);
    }
  </script>
</body>
</html>
